<section class="mx-auto max-w-7xl p-4">
    <mat-toolbar class="!rounded-xl !bg-[#1d160c]/90 !border !border-amber-300/40 flex justify-between gap-3">
        <div>
            <h1 class="m-0 uppercase tracking-[0.14em] text-amber-200 text-lg">Cache Forge</h1>
            <p class="m-0 text-xs text-amber-100/75">Runic admin portal for Hagalaz cache.</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm text-amber-50/90">{{ authStore.user()?.preferred_username }}</span>
            <button mat-flat-button (click)="logout()">Logout</button>
        </div>
    </mat-toolbar>

    <nav class="flex gap-2 my-4">
        <a mat-stroked-button routerLink="/cache/types" routerLinkActive="mdc-button--filled">Types</a>
        <a mat-stroked-button routerLink="/cache/sprites" routerLinkActive="mdc-button--filled">Sprites</a>
    </nav>

    <router-outlet></router-outlet>
</section>
