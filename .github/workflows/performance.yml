name: Performance Regression Tracking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Hagalaz.Benchmarks/Hagalaz.Benchmarks.csproj

      - name: Build
        run: dotnet build Hagalaz.Benchmarks/Hagalaz.Benchmarks.csproj -c Release --no-restore

      - name: Run Benchmarks (stable CI mode)
        run: |
          dotnet run -c Release --project Hagalaz.Benchmarks -- \
            --filter "*" \
            --exporters json \
            --artifacts "./BenchmarkDotNet.Artifacts" \
            --iterationCount 15 \
            --warmupCount 5 \
            --minIterationTime 100ms

      - name: Store and compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Hagalaz Performance Benchmarks
          tool: benchmarkdotnet
          output-file-path: BenchmarkDotNet.Artifacts/results/Hagalaz.Benchmarks.HagalazBenchmarks-report-full.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: true
